<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peta Interaktif – GeoPortal Bulukumba</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <script>const BASE_URL = '/geo';</script>
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        #explorer-map { height: calc(100vh - 60px); width: 100%; }
        .glass { background: rgba(255,255,255,0.9); backdrop-filter: blur(12px); }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .slide-in { animation: slideIn 0.3s ease-out; }
        .layer-item { transition: all 0.2s; cursor: pointer; }
        .layer-item:hover { background: #ecfdf5; }
        .layer-item.active { background: #d1fae5; border-color: #059669; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-100">

<!-- ===== TOP BAR ===== -->
<div class="h-[60px] bg-gradient-to-r from-emerald-700 to-teal-600 text-white flex items-center px-4 lg:px-8 shadow-lg justify-between">
    <div class="flex items-center gap-3">
        <a href="/geo/" class="text-xl">🗺️</a>
        <span class="font-extrabold">Peta Interaktif Bulukumba</span>
    </div>
    <div class="flex items-center gap-2">
        <span class="text-emerald-200 text-xs font-medium" id="active-count">0 layer aktif</span>
        <button onclick="toggleLayerPanel()" class="px-3 py-1.5 bg-white/10 hover:bg-white/20 rounded-lg text-xs font-bold transition backdrop-blur-sm border border-white/10">📋 Layer</button>
        <a href="/geo/datasets" class="hidden md:inline px-3 py-1.5 bg-white/10 hover:bg-white/20 rounded-lg text-xs font-bold transition backdrop-blur-sm">📦 Dataset</a>
    </div>
</div>

<!-- ===== MAP ===== -->
<div id="explorer-map"></div>

<!-- ===== LAYER PANEL ===== -->
<div id="layer-panel" class="fixed top-[60px] right-0 z-[10000] w-80 h-[calc(100vh-60px)] bg-white shadow-2xl border-l border-slate-200 hidden slide-in overflow-y-auto">
    <div class="p-4 border-b border-slate-100 sticky top-0 bg-white z-10">
        <div class="flex items-center justify-between">
            <h2 class="font-bold text-slate-700 text-sm">📋 Layer Dataset</h2>
            <button onclick="toggleLayerPanel()" class="text-slate-400 hover:text-slate-600 text-lg">&times;</button>
        </div>
        <div class="relative mt-3">
            <input type="text" id="layer-search" placeholder="Cari layer..."
                   class="w-full px-3 py-2 pl-8 border border-slate-200 rounded-lg text-xs focus:ring-2 focus:ring-emerald-500 outline-none transition"
                   oninput="filterLayers()">
            <span class="absolute left-2.5 top-2 text-slate-400 text-xs">🔍</span>
        </div>
    </div>
    <div class="p-3" id="layer-list">
        <div class="text-center py-8 text-slate-400 text-sm">Memuat layer...</div>
    </div>
</div>

<script>
const geoserverUrl = '{{ geoserver_url }}';
let activeLayers = {};
let wmsLayers = {};
let allDatasets = [];

// === MAP ===
const map = L.map('explorer-map', {
    center: [-5.4, 120.2],
    zoom: 10,
    zoomControl: false
});
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OSM &copy; CARTO', subdomains: 'abcd', maxZoom: 19
}).addTo(map);
L.control.zoom({ position: 'bottomleft' }).addTo(map);

// === LOAD ALL DATASETS ===
async function loadAllDatasets() {
    try {
        const res = await fetch(BASE_URL+'/api/datasets?page_size=100');
        const data = await res.json();
        allDatasets = data.datasets || [];
        renderLayerList(allDatasets);
    } catch(e) {
        document.getElementById('layer-list').innerHTML = '<div class="text-center py-8 text-red-400 text-sm">Gagal memuat layer</div>';
    }
}

function renderLayerList(datasets) {
    const container = document.getElementById('layer-list');
    if (datasets.length === 0) {
        container.innerHTML = '<div class="text-center py-8 text-slate-400 text-sm">Tidak ada layer ditemukan</div>';
        return;
    }
    container.innerHTML = datasets.map(ds => `
        <div class="layer-item flex items-center gap-3 p-2.5 rounded-xl border border-slate-100 mb-1.5 ${activeLayers[ds.pk] ? 'active' : ''}"
             onclick="toggleLayer('${ds.pk}', '${ds.name}', '${ds.title.replace(/'/g, "\\'")}', ${JSON.stringify(ds.extent || [])})">
            <div class="w-4 h-4 flex items-center justify-center">
                <div class="w-3.5 h-3.5 rounded border-2 ${activeLayers[ds.pk] ? 'bg-emerald-500 border-emerald-500' : 'border-slate-300'} transition flex items-center justify-center">
                    ${activeLayers[ds.pk] ? '<span class="text-white text-[8px]">✓</span>' : ''}
                </div>
            </div>
            <div class="flex-1 min-w-0">
                <p class="text-xs font-bold text-slate-700 truncate">${ds.title}</p>
                <p class="text-[10px] text-slate-400">${ds.owner} · ${ds.category}</p>
            </div>
            <a href="/geo/dataset/${ds.pk}" class="text-[10px] text-emerald-600 hover:text-emerald-500 font-bold shrink-0" onclick="event.stopPropagation()">🔍</a>
        </div>
    `).join('');
}

function toggleLayer(pk, name, title, extent) {
    const isActive = activeLayers[pk];
    if (isActive) {
        // Remove
        if (wmsLayers[pk]) {
            map.removeLayer(wmsLayers[pk]);
            delete wmsLayers[pk];
        }
        delete activeLayers[pk];
    } else {
        // Add WMS layer
        const wms = L.tileLayer.wms(`${geoserverUrl}/ows`, {
            layers: `geonode:${name}`,
            format: 'image/png',
            transparent: true,
            version: '1.3.0',
            attribution: title
        }).addTo(map);

        wmsLayers[pk] = wms;
        activeLayers[pk] = true;

        // Fit to extent
        if (extent && extent.length === 4) {
            map.fitBounds([[extent[1], extent[0]], [extent[3], extent[2]]], { padding: [30, 30] });
        }
    }
    updateActiveCount();
    renderLayerList(allDatasets);
}

function updateActiveCount() {
    const count = Object.keys(activeLayers).length;
    document.getElementById('active-count').textContent = count + ' layer aktif';
}

function toggleLayerPanel() {
    const panel = document.getElementById('layer-panel');
    panel.classList.toggle('hidden');
}

function filterLayers() {
    const q = document.getElementById('layer-search').value.toLowerCase();
    const filtered = allDatasets.filter(ds =>
        ds.title.toLowerCase().includes(q) ||
        ds.owner.toLowerCase().includes(q) ||
        ds.category.toLowerCase().includes(q)
    );
    renderLayerList(filtered);
}

// === INIT ===
loadAllDatasets();

// Close layer panel on map click
map.on('click', () => {
    document.getElementById('layer-panel').classList.add('hidden');
});
</script>
</body>
</html>
