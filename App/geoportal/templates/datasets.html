<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dataset – GeoPortal Bulukumba</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <script>const BASE_URL = '/geo';</script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        .glass { background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); }
        .dataset-card { transition: all 0.3s cubic-bezier(0.4,0,0.2,1); cursor: pointer; }
        .dataset-card:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(0,0,0,0.1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        .pagination-btn { @apply px-3 py-1.5 text-xs font-bold rounded-lg border transition; }
    </style>
</head>
<body>
<!-- ===== HEADER ===== -->
<header class="bg-gradient-to-r from-emerald-700 to-teal-600 text-white px-4 lg:px-8 py-5 shadow-lg sticky top-0 z-50">
    <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="flex items-center gap-3">
            <a href="/geo/" class="text-2xl">🗺️</a>
            <div>
                <h1 class="text-xl font-extrabold">Katalog Dataset</h1>
                <p class="text-emerald-100 text-xs font-medium">GeoPortal Bulukumba · <span id="total-label">{{ total }} dataset</span></p>
            </div>
        </div>
        <div class="flex gap-2 w-full md:w-auto">
            <div class="relative flex-1 md:w-72">
                <input type="text" id="search-input" value="{{ search }}"
                       placeholder="Cari dataset..."
                       class="w-full px-4 py-2 pl-10 rounded-xl border-0 text-sm text-slate-800 bg-white/20 backdrop-blur-sm placeholder-white/50 focus:ring-2 focus:ring-emerald-300 outline-none transition">
                <span class="absolute left-3 top-2 text-white/60 text-sm">🔍</span>
            </div>
            <select id="category-filter" class="px-3 py-2 rounded-xl border-0 text-sm font-bold bg-white/20 text-white backdrop-blur-sm outline-none focus:ring-2 focus:ring-emerald-300">
                <option value="">Semua</option>
            </select>
            <a href="/geo/" class="px-4 py-2 bg-white/10 hover:bg-white/20 rounded-xl text-sm font-bold transition backdrop-blur-sm">🏠</a>
        </div>
    </div>
</header>

<main class="max-w-7xl mx-auto px-4 lg:px-8 py-6">
    <!-- ===== LOADING ===== -->
    <div id="loading" class="text-center py-20 hidden">
        <div class="inline-flex gap-2">
            <span class="w-3 h-3 bg-emerald-500 rounded-full loading-dot"></span>
            <span class="w-3 h-3 bg-emerald-500 rounded-full loading-dot"></span>
            <span class="w-3 h-3 bg-emerald-500 rounded-full loading-dot"></span>
        </div>
        <p class="text-slate-500 text-sm mt-4 font-medium">Memuat data...</p>
    </div>

    <!-- ===== DATASET GRID ===== -->
    <div id="dataset-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 fade-in"></div>

    <!-- ===== EMPTY ===== -->
    <div id="empty-state" class="hidden text-center py-20">
        <span class="text-6xl">📭</span>
        <p class="text-slate-500 mt-4 text-lg font-bold">Tidak ada dataset ditemukan</p>
        <p class="text-slate-400 text-sm mt-1">Coba ubah kata kunci pencarian</p>
    </div>

    <!-- ===== PAGINATION ===== -->
    <div id="pagination" class="hidden flex justify-center items-center gap-3 mt-8"></div>
</main>

<footer class="bg-white border-t border-slate-200 py-4 text-center">
    <p class="text-slate-400 text-xs font-medium">callunk@2026 · Powered by GeoNode</p>
</footer>

<script>
let currentPage = 1;
let currentSearch = document.getElementById('search-input').value;
let currentCategory = '';

// === LOAD CATEGORIES ===
fetch(BASE_URL+'/api/categories').then(r => r.json()).then(d => {
    const sel = document.getElementById('category-filter');
    (d.categories || []).forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.id;
        opt.textContent = `${c.name} (${c.count})`;
        sel.appendChild(opt);
    });
});

// === LOAD DATASETS ===
function loadDatasets(page, search, category) {
    const grid = document.getElementById('dataset-grid');
    const loading = document.getElementById('loading');
    const empty = document.getElementById('empty-state');
    const pagination = document.getElementById('pagination');

    loading.classList.remove('hidden');
    grid.classList.add('hidden');
    empty.classList.add('hidden');
    pagination.classList.add('hidden');

    let params = `page=${page}&page_size=12`;
    if (search) params += `&search=${encodeURIComponent(search)}`;
    if (category) params += `&category=${encodeURIComponent(category)}`;

    fetch(BASE_URL+`/api/datasets?${params}`)
        .then(r => r.json())
        .then(d => {
            loading.classList.add('hidden');
            const datasets = d.datasets || [];

            if (datasets.length === 0) {
                empty.classList.remove('hidden');
                return;
            }

            grid.innerHTML = datasets.map(ds => `
                <a href="/geo/dataset/${ds.pk}" class="dataset-card bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm block">
                    <div class="h-36 bg-slate-100 relative overflow-hidden">
                        ${ds.thumbnail ? `<img src="${ds.thumbnail}" class="w-full h-full object-cover" onerror="this.style.display='none'" />` : ''}
                        <div class="absolute inset-0 bg-gradient-to-t from-black/30 to-transparent"></div>
                        <div class="absolute bottom-2 left-2 right-2 flex gap-1.5">
                            <span class="px-2 py-0.5 bg-white/90 backdrop-blur-sm text-[10px] font-bold text-slate-700 rounded-full">${ds.category}</span>
                        </div>
                    </div>
                    <div class="p-4">
                        <h3 class="font-bold text-slate-800 text-sm leading-snug line-clamp-2">${ds.title}</h3>
                        <p class="text-[11px] text-slate-500 mt-1 font-medium flex items-center gap-1">🏛️ ${ds.owner}</p>
                        <p class="text-[11px] text-slate-400 mt-2 line-clamp-2">${ds.abstract}</p>
                        <div class="flex items-center justify-between mt-3 pt-3 border-t border-slate-100">
                            <span class="text-[10px] text-slate-400">📅 ${new Date(ds.created).toLocaleDateString('id-ID')}</span>
                            <span class="text-[10px] font-bold text-emerald-600 hover:text-emerald-500">Lihat →</span>
                        </div>
                    </div>
                </a>
            `).join('');

            grid.classList.remove('hidden');
            document.getElementById('total-label').textContent = d.total + ' dataset';

            // Pagination
            if (d.total_pages > 1) {
                pagination.classList.remove('hidden');
                let html = '';
                if (page > 1) html += `<button onclick="goToPage(${page-1})" class="pagination-btn bg-white text-slate-600 border-slate-300 hover:bg-slate-50">←</button>`;
                for (let i = Math.max(1, page-2); i <= Math.min(d.total_pages, page+2); i++) {
                    html += `<button onclick="goToPage(${i})" class="pagination-btn ${i === page ? 'bg-emerald-600 text-white border-emerald-600' : 'bg-white text-slate-600 border-slate-300 hover:bg-slate-50'}">${i}</button>`;
                }
                if (page < d.total_pages) html += `<button onclick="goToPage(${page+1})" class="pagination-btn bg-white text-slate-600 border-slate-300 hover:bg-slate-50">→</button>`;
                pagination.innerHTML = html;
            }
        })
        .catch(() => {
            loading.classList.add('hidden');
            empty.classList.remove('hidden');
            empty.querySelector('p').textContent = 'Gagal memuat data';
        });
}

function goToPage(p) {
    currentPage = p;
    loadDatasets(p, currentSearch, currentCategory);
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// === SEARCH & FILTER ===
let searchTimer;
document.getElementById('search-input').addEventListener('input', function() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
        currentSearch = this.value;
        currentPage = 1;
        loadDatasets(1, currentSearch, currentCategory);
    }, 400);
});

document.getElementById('category-filter').addEventListener('change', function() {
    currentCategory = this.value;
    currentPage = 1;
    loadDatasets(1, currentSearch, currentCategory);
});

// === INITIAL LOAD ===
loadDatasets(1, currentSearch, currentCategory);
</script>
</body>
</html>
