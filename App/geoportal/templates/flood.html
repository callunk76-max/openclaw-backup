<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peta Rawan Banjir Bulukumba 🌊</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <script>const BASE_URL = '/geo';</script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        #map { height: 100vh; width: 100%; }
        .glass { background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .glass-dark { background: rgba(15,23,42,0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .hero-overlay { background: linear-gradient(180deg, rgba(15,23,42,0.7) 0%, rgba(15,23,42,0.3) 50%, transparent 100%); }
        .layer-btn { transition: all 0.2s ease; }
        .layer-btn:hover { transform: translateX(2px); }
        .layer-btn.active { background: rgba(16, 185, 129, 0.15); border-color: #10b981; }
        .base-btn { transition: all 0.15s ease; }
        .base-btn:hover { opacity: 0.85; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .anim-fade { animation: fadeInUp 0.4s ease-out; }
        .anim-fade-2 { animation: fadeInUp 0.4s ease-out 0.08s both; }
        .leaflet-popup-content-wrapper { border-radius: 12px !important; box-shadow: 0 10px 30px rgba(0,0,0,0.15) !important; }
        .leaflet-popup-content { margin: 12px 16px !important; font-family: 'Inter', sans-serif !important; }
        .legend-color { width: 20px; height: 14px; border-radius: 3px; flex-shrink: 0; border: 1px solid rgba(0,0,0,0.1); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-900 text-white">

<div id="map" class="absolute inset-0"></div>

<!-- ===== TOP BAR ===== -->
<div class="absolute top-0 left-0 right-0 z-[1000] hero-overlay pointer-events-none">
    <div class="container mx-auto px-4 lg:px-8 py-3 flex items-center justify-between pointer-events-auto">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-red-500 rounded-xl flex items-center justify-center text-xl shadow-lg">🌊</div>
            <div>
                <h1 class="text-lg font-extrabold tracking-tight text-white">Peta Rawan Banjir Bulukumba</h1>
                <p class="text-[10px] text-red-200 font-medium">Sumber: inaRISK BNPB · GeoPortal Bulukumba</p>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <a href="/geo/flood3d" class="px-3 py-1.5 bg-gradient-to-r from-blue-600 to-red-600 hover:from-blue-500 hover:to-red-500 rounded-lg text-xs font-bold transition text-white border border-white/10 shadow-lg">🗻 3D</a>
            <a href="/geo/" class="px-3 py-1.5 bg-white/10 hover:bg-white/20 rounded-lg text-xs font-bold transition text-white border border-white/10">🏠 Beranda</a>
        </div>
    </div>
</div>

<!-- ===== LAYER CONTROL ===== -->
<div class="absolute left-3 top-16 z-[1000] anim-fade">
    <div class="glass-dark rounded-xl p-3 shadow-2xl border border-white/10 w-52">
        <p class="text-xs font-bold text-white/70 uppercase tracking-wider mb-2.5">🌍 Layer</p>
        
        <!-- BASEMAP -->
        <div class="grid grid-cols-3 gap-1 mb-2.5">
            <button onclick="switchBase('light')" id="b-light" class="base-btn px-1.5 py-1.5 bg-emerald-500/20 text-white text-[10px] font-bold rounded-lg border border-emerald-500/40">☀️</button>
            <button onclick="switchBase('dark')" id="b-dark" class="base-btn px-1.5 py-1.5 bg-white/8 text-white/50 text-[10px] font-bold rounded-lg border border-transparent hover:bg-white/10">🌙</button>
            <button onclick="switchBase('sat')" id="b-sat" class="base-btn px-1.5 py-1.5 bg-white/8 text-white/50 text-[10px] font-bold rounded-lg border border-transparent hover:bg-white/10">🛰️</button>
        </div>
        
        <div class="space-y-1">
            <div class="layer-btn active flex items-center gap-2 p-2 rounded-lg border border-emerald-500/40" onclick="toggleLayer('hazard', this)">
                <div class="w-3 h-3 rounded-full" style="background:linear-gradient(135deg,#1a9850,#fee08b,#f46d43,#a50026)"></div>
                <span class="text-xs font-semibold text-white">Bahaya Banjir</span>
                <span class="ml-auto text-[10px] text-emerald-400 font-bold">ON</span>
            </div>
            <div class="layer-btn flex items-center gap-2 p-2 rounded-lg bg-white/5 border border-transparent" onclick="toggleLayer('risk', this)">
                <div class="w-3 h-3 rounded-full" style="background:linear-gradient(135deg,#ffffcc,#ffeda0,#feb24c,#f03b20)"></div>
                <span class="text-xs font-semibold text-white/70">Risiko Banjir</span>
                <span class="ml-auto text-[10px] text-white/30">OFF</span>
            </div>
            <div class="layer-btn active flex items-center gap-2 p-2 rounded-lg border border-amber-500/40" onclick="toggleLayer('postdisaster', this)">
                <div class="w-3 h-3 rounded-full bg-amber-400"></div>
                <span class="text-xs font-semibold text-white">Pascabencana</span>
                <span class="ml-auto text-[10px] text-amber-400 font-bold">ON</span>
            </div>
            <div class="layer-btn active flex items-center gap-2 p-2 rounded-lg border border-blue-500/40" onclick="toggleLayer('history', this)">
                <div class="w-3 h-3 rounded-full bg-blue-400"></div>
                <span class="text-xs font-semibold text-white">Riwayat Banjir</span>
                <span class="ml-auto text-[10px] text-blue-400 font-bold">ON</span>
            </div>
        </div>
    </div>
</div>

<!-- ===== LEGEND ===== -->
<div class="absolute right-3 top-16 z-[1000] anim-fade-2">
    <div class="glass-dark rounded-xl p-3 shadow-2xl border border-white/10 w-44">
        <p class="text-xs font-bold text-white/70 uppercase tracking-wider mb-2">📊 Legenda</p>
        <div id="legend-box" class="space-y-1">
            <div class="flex items-center gap-2 py-0.5"><div class="legend-color" style="background:#1a9850"></div><span class="text-xs text-white/70">Rendah</span></div>
            <div class="flex items-center gap-2 py-0.5"><div class="legend-color" style="background:#fee08b"></div><span class="text-xs text-white/70">Sedang</span></div>
            <div class="flex items-center gap-2 py-0.5"><div class="legend-color" style="background:#f46d43"></div><span class="text-xs text-white/70">Tinggi</span></div>
            <div class="flex items-center gap-2 py-0.5"><div class="legend-color" style="background:#a50026"></div><span class="text-xs text-white/70">Sangat Tinggi</span></div>
            <div class="flex items-center gap-2 py-0.5 pt-1.5 mt-1 border-t border-white/10"><div class="w-3 h-3 rounded-full bg-amber-400 flex-shrink-0"></div><span class="text-xs text-white/60">Pascabencana</span></div>
            <div class="flex items-center gap-2 py-0.5"><div class="w-3 h-3 rounded-full bg-blue-400 flex-shrink-0"></div><span class="text-xs text-white/60">Riwayat Banjir</span></div>
        </div>
    </div>
</div>

<!-- ===== BOTTOM INFO ===== -->
<div class="absolute bottom-0 left-0 right-0 z-[1000]">
    <div class="container mx-auto px-4 pb-3">
        <div class="glass-dark rounded-xl p-2.5 border border-white/10 shadow-2xl">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3 text-[10px]">
                    <span class="text-emerald-400 font-bold">●</span>
                    <span class="text-white/40" id="coord-info">—</span>
                    <span class="text-white/20">|</span>
                    <span class="text-white/40" id="zoom-info">Zoom: —</span>
                </div>
                <span class="text-[10px] text-white/20">callunk@2026</span>
            </div>
        </div>
    </div>
</div>

<script>
// ===== MAP & BASEMAPS =====
const map = L.map('map', {
    center: [-5.42, 120.18],
    zoom: 11,
    zoomControl: false,
    maxBounds: [[-5.85, 119.7], [-4.95, 120.7]]
});
L.control.zoom({ position: 'bottomleft' }).addTo(map);

// Create all basemaps but DON'T add any yet
const baseLayers = {};

baseLayers.light = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OSM &copy; CARTO',
    subdomains: 'abcd', maxZoom: 19
});

baseLayers.dark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OSM &copy; CARTO',
    subdomains: 'abcd', maxZoom: 19
});

baseLayers.sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'ESRI', maxZoom: 19
});

// Add default basemap
baseLayers.light.addTo(map);

// ===== WMS OVERLAY LAYERS (tileSize=512) =====
const inariskBase = 'https://inarisk1.bnpb.go.id:8443/geoserver/wms';
const wmsOpts = { format: 'image/png', transparent: true, opacity: 0.55, version: '1.3.0', crs: L.CRS.EPSG4326, tileSize: 512 };

const wmsLayers = {};
wmsLayers.hazard = L.tileLayer.wms(inariskBase, Object.assign({}, wmsOpts, { layers: 'raster:INDEKS_BAHAYA_BANJIR1' })).addTo(map);
wmsLayers.risk = L.tileLayer.wms(inariskBase, Object.assign({}, wmsOpts, { layers: 'raster:INDEKS_RISIKO_BANJIR1' }));
wmsLayers.history = L.tileLayer.wms(inariskBase, Object.assign({}, wmsOpts, { layers: 'basemap:Historis_Banjir_2015-2021', opacity: 0.6 })).addTo(map);

// ===== KECAMATAN BOUNDARIES =====
L.tileLayer.wms(inariskBase, {
    layers: 'basemap:batas_kecamatan',
    format: 'image/png', transparent: true, opacity: 0.35,
    version: '1.3.0', crs: L.CRS.EPSG4326, tileSize: 512
}).addTo(map);

// ===== POST-DISASTER MARKERS =====
const postDisasterLayer = L.layerGroup().addTo(map);

const amberIcon = L.icon({
    iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-amber.png',
    shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
    iconSize: [20, 30], iconAnchor: [10, 30], popupAnchor: [0, -30], shadowSize: [30, 30]
});

fetch(BASE_URL+'/api/datasets')
    .then(r => r.json())
    .then(d => {
        const ds = d.datasets.find(x => x.name === 'shp_pascabencana_2025_sesuai_kewenangan');
        if (!ds) return;
        return fetch(`/geo/api/dataset/${ds.pk}`).then(r => r.json());
    })
    .then(detail => {
        if (!detail || !detail.geojson_url) return;
        return fetch(detail.geojson_url).then(r => r.json());
    })
    .then(geo => {
        if (!geo) return;
        geo.features.forEach(f => {
            const p = f.properties || {};
            const coords = [p.koordy, p.koordx];
            if (!coords[0] || !coords[1]) return;
            L.marker(coords, { icon: amberIcon })
                .bindPopup(`
                    <div style="min-width:200px">
                        <p style="font-weight:800;font-size:14px;margin-bottom:3px;color:#1e293b">🛠️ ${p.namobj || 'Infrastruktur'}</p>
                        <div style="font-size:11px;color:#475569">
                            <p><b>Desa:</b> ${p.wadmkd || '—'}</p>
                            <p><b>Kategori:</b> ${p.remark || '—'}</p>
                            <p><b>Tahun:</b> ${p.tahun || '—'}</p>
                        </div>
                        <p style="font-size:10px;color:#94a3b8;margin-top:3px">Infrastruktur terdampak bencana 2025</p>
                    </div>
                `)
                .addTo(postDisasterLayer);
        });
    })
    .catch(() => {});

// ===== BASEMAP SWITCHING =====
let currentBase = 'light';
const baseBtnIds = { light: 'b-light', dark: 'b-dark', sat: 'b-sat' };

function switchBase(mode) {
    if (mode === currentBase) return;
    
    // Remove current basemap
    map.removeLayer(baseLayers[currentBase]);
    
    // Add new basemap
    baseLayers[mode].addTo(map);
    currentBase = mode;
    
    // Update buttons
    Object.keys(baseBtnIds).forEach(k => {
        const btn = document.getElementById(baseBtnIds[k]);
        if (k === mode) {
            btn.className = 'base-btn px-1.5 py-1.5 bg-emerald-500/20 text-white text-[10px] font-bold rounded-lg border border-emerald-500/40';
        } else {
            btn.className = 'base-btn px-1.5 py-1.5 bg-white/8 text-white/50 text-[10px] font-bold rounded-lg border border-transparent hover:bg-white/10';
        }
    });
}

// ===== LAYER TOGGLE =====
const layerStates = { hazard: true, risk: false, history: true, postdisaster: true };
const wmsMap = { hazard: wmsLayers.hazard, risk: wmsLayers.risk, history: wmsLayers.history };

function toggleLayer(name, btn) {
    layerStates[name] = !layerStates[name];
    const isOn = layerStates[name];
    
    if (isOn) {
        btn.classList.add('active', 'bg-emerald-500/20', 'border-emerald-500/40');
        btn.classList.remove('bg-white/5', 'border-transparent');
        btn.querySelector('span:last-child').textContent = 'ON';
        btn.querySelector('span:last-child').className = 'ml-auto text-[10px] text-emerald-400 font-bold';
    } else {
        btn.classList.remove('active', 'bg-emerald-500/20', 'border-emerald-500/40');
        btn.classList.add('bg-white/5', 'border-transparent');
        btn.querySelector('span:last-child').textContent = 'OFF';
        btn.querySelector('span:last-child').className = 'ml-auto text-[10px] text-white/30';
    }
    
    if (name === 'postdisaster') {
        if (isOn) map.addLayer(postDisasterLayer);
        else map.removeLayer(postDisasterLayer);
    } else if (wmsMap[name]) {
        if (isOn) map.addLayer(wmsMap[name]);
        else map.removeLayer(wmsMap[name]);
    }
}

// ===== MAP INFO =====
map.on('mousemove', e => {
    document.getElementById('coord-info').textContent = `${e.latlng.lat.toFixed(4)}, ${e.latlng.lng.toFixed(4)}`;
});
map.on('zoomend', () => {
    document.getElementById('zoom-info').textContent = `Zoom: ${map.getZoom()}`;
});

// ===== KECAMATAN LABELS =====
const kets = [
    {name:'Ujung Bulu',lat:-5.55,lng:120.19},{name:'Ujung Loe',lat:-5.47,lng:120.27},
    {name:'Gantarang',lat:-5.52,lng:120.35},{name:'Kindang',lat:-5.33,lng:120.08},
    {name:'Bulukumpa',lat:-5.38,lng:120.14},{name:'Rilau Ale',lat:-5.42,lng:120.13},
    {name:'Kajang',lat:-5.31,lng:120.08},{name:'Herlang',lat:-5.39,lng:120.21},
    {name:'Bontotiro',lat:-5.55,lng:120.42},{name:'Bonto Bahari',lat:-5.55,lng:120.42},
    {name:'Bontominasa',lat:-5.31,lng:120.23}
];

kets.forEach(k => {
    L.circleMarker([k.lat, k.lng], { radius: 0.1, color: 'rgba(255,255,255,0.6)', fillOpacity: 0.8 })
        .addTo(map)
        .bindTooltip(k.name, { permanent: true, direction: 'center', className: 'kec-label' });
});

const style = document.createElement('style');
style.textContent = `
    .kec-label {
        background: transparent !important; border: none !important; box-shadow: none !important;
        font-size: 11px !important; font-weight: 700 !important; color: rgba(255,255,255,0.9) !important;
        text-shadow: 0 1px 3px rgba(0,0,0,0.8) !important; font-family: 'Inter', sans-serif !important;
    }
    .kec-label::before { display: none !important; }
`;
document.head.appendChild(style);

map.fitBounds([[ -5.75, 119.8 ], [ -5.0, 120.6 ]], { padding: [20, 20] });
</script>
</body>
</html>
