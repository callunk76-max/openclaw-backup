<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS - Aramedica Farma</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f7f6; }
        .pos-container { height: calc(100vh - 100px); }
        .product-list { height: 100%; overflow-y: auto; }
        .cart-list { height: calc(100% - 250px); overflow-y: auto; }
        .card-product { cursor: pointer; transition: 0.2s; border-radius: 12px; }
        .card-product:hover { background-color: #e9ecef; transform: scale(1.02); }
        .sidebar { min-height: 100vh; background: #2c3e50; color: white; }
        .sidebar .nav-link { color: #bdc3c7; transition: 0.3s; border-radius: 8px; margin-bottom: 5px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #34495e; color: white; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar p-3 shadow">
                <div class="text-center mb-4">
                    <h4 class="fw-bold">Aramedica 🏥</h4>
                </div>
                <nav class="nav flex-column">
                    <a class="nav-link" href="/dashboard"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
                    <a class="nav-link active" href="/pos"><i class="bi bi-cart-plus me-2"></i> POS</a>
                    <a class="nav-link" href="/inventory"><i class="bi bi-box-seam me-2"></i> Inventory</a>
                    <a class="nav-link" href="/finance"><i class="bi bi-graph-up-arrow me-2"></i> Finance</a>
                    <a class="nav-link" href="/patients"><i class="bi bi-people me-2"></i> Patients</a>
                    <hr>
                    <a class="nav-link text-danger" href="/logout"><i class="bi bi-box-arrow-right me-2"></i> Logout</a>
                </nav>
            </div>

            <div class="col-md-10 p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3 class="fw-bold">Point of Sale (POS)</h3>
                    <div class="d-flex gap-2">
                        <select id="patientSelect" class="form-select w-auto">
                            <option value="">Walk-in Patient</option>
                            {% for p in patients %}
                            <option value="{{ p.id }}">{{ p.name }}</option>
                            {% endfor %}
                        </select>
                        <select id="paymentMethod" class="form-select w-auto">
                            <option value="Cash">Cash</option>
                            <option value="Transfer">Transfer</option>
                            <option value="Insurance">Insurance</option>
                        </select>
                    </div>
                </div>

                <div class="row pos-container g-4">
                    <div class="col-md-7">
                        <div class="card h-100 shadow-sm rounded-4">
                            <div class="card-header bg-white fw-bold py-3">
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0"><i class="bi bi-search"></i></span>
                                    <input type="text" id="searchProduct" class="form-control border-start-0" placeholder="Cari obat atau suplemen...">
                                </div>
                            </div>
                            <div class="card-body product-list">
                                <div class="row g-3" id="productGrid">
                                    {% for p in products %}
                                    <div class="col-md-4">
                                        <div class="card card-product p-3 shadow-sm text-center" onclick="addToCart({{ p.id }}, '{{ p.name }}', {{ p.price }})">
                                            <div class="fw-bold">{{ p.name }}</div>
                                            <div class="text-muted small mb-2">{{ p.unit }}</div>
                                            <div class="text-primary fw-bold">Rp {{ "{:,.0f}".format(p.price) }}</div>
                                            <div class="badge bg-info text-dark mt-2">Stok: {{ p.stock }}</div>
                                        </div>
                                    </div>
                                    {% endfor %}
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-5">
                        <div class="card h-100 shadow-sm rounded-4">
                            <div class="card-header bg-white fw-bold py-3">Shopping Cart</div>
                            <div class="card-body cart-list">
                                <table class="table table-sm">
                                    <thead>
                                        <tr>
                                            <th>Produk</th>
                                            <th class="text-center">Qty</th>
                                            <th class="text-end">Subtotal</th>
                                            <th></th>
                                        </tr>
                                    </thead>
                                    <tbody id="cartItems">
                                        <!-- Items go here -->
                                    </tbody>
                                </table>
                            </div>
                            <div class="card-footer bg-white p-4">
                                <div class="d-flex justify-content-between mb-3">
                                    <span class="h5">Total</span>
                                    <span class="h5 fw-bold text-primary" id="cartTotal">Rp 0</span>
                                </div>
                                <button class="btn btn-primary w-100 py-3 fw-bold fs-5" onclick="checkout()">Selesaikan Transaksi 💳</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let cart = [];
        
        function addToCart(id, name, price) {
            const existing = cart.find(i => i.id === id);
            if (existing) {
                existing.qty++;
            } else {
                cart.push({ id, name, price, qty: 1 });
            }
            renderCart();
        }

        function removeFromCart(id) {
            cart = cart.filter(i => i.id !== id);
            renderCart();
        }

        function updateQty(id, delta) {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.qty += delta;
                if (item.qty < 1) removeFromCart(id);
                else renderCart();
            }
        }

        function renderCart() {
            const list = document.getElementById('cartItems');
            list.innerHTML = '';
            let total = 0;
            
            cart.forEach(item => {
                const subtotal = item.qty * item.price;
                total += subtotal;
                list.innerHTML += `
                    <tr>
                        <td>${item.name}</td>
                        <td class="text-center">
                            <div class="btn-group btn-group-sm">
                                <button class="btn btn-outline-secondary" onclick="updateQty(${item.id}, -1)">-</button>
                                <span class="btn btn-light px-3">${item.qty}</span>
                                <button class="btn btn-outline-secondary" onclick="updateQty(${item.id}, 1)">+</button>
                            </div>
                        </td>
                        <td class="text-end">Rp ${subtotal.toLocaleString()}</td>
                        <td class="text-end"><button class="btn btn-sm text-danger" onclick="removeFromCart(${item.id})"><i class="bi bi-trash"></i></button></td>
                    </tr>
                `;
            });
            document.getElementById('cartTotal').innerText = 'Rp ' + total.toLocaleString();
        }

        async function checkout() {
            if (cart.length === 0) return alert('Keranjang kosong!');
            
            const total = cart.reduce((sum, item) => sum + (item.qty * item.price), 0);
            const data = {
                patient_id: document.getElementById('patientSelect').value || null,
                payment_method: document.getElementById('paymentMethod').value,
                total: total,
                items: cart
            };

            const resp = await fetch('/ar/api/sale', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await resp.json();
            if (result.success) {
                alert('Transaksi Berhasil! Sale ID: ' + result.sale_id);
                cart = [];
                renderCart();
            } else {
                alert('Error: ' + result.error);
            }
        }
    </script>
</body>
</html>
