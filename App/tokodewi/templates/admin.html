<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Toko Dewi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand">Admin Toko Dewi ⚙️</span>
            <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-4">
                <div class="card mb-4 shadow-sm">
                    <div class="card-header fw-bold">Pengaturan Toko</div>
                    <div class="card-body">
                        <form action="/admin/settings" method="POST">
                            <div class="mb-3">
                                <label class="form-label">Nama Toko</label>
                                <input type="text" name="shop_name" class="form-control" value="{{ settings.shop_name }}">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">WhatsApp (Gunakan format 62...)</label>
                                <input type="text" name="whatsapp" class="form-control" value="{{ settings.whatsapp }}">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Deskripsi Toko</label>
                                <textarea name="description" class="form-control">{{ settings.description }}</textarea>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Update Settings</button>
                        </form>
                    </div>
                </div>

                <div class="card shadow-sm">
                    <div class="card-header fw-bold">Tambah Produk Baru</div>
                    <div class="card-body">
                        <form action="/admin/product/add" method="POST" enctype="multipart/form-data">
                            <div class="mb-3">
                                <label class="form-label">Nama Produk</label>
                                <input type="text" name="name" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Kategori</label>
                                <select name="category" class="form-select">
                                    <option value="Pakaian">👕 Pakaian</option>
                                    <option value="Bahan Makanan">🍎 Bahan Makanan</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Harga</label>
                                <input type="text" name="price" class="form-control" placeholder="Contoh: Rp 50.000" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Deskripsi</label>
                                <textarea name="desc" class="form-control"></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Foto Produk</label>
                                <input type="file" name="image" class="form-control">
                                <input type="text" name="image_url" class="form-control mt-2" placeholder="Atau masukkan URL gambar">
                            </div>
                            <button type="submit" class="btn btn-success w-100">Simpan Produk</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header fw-bold">Daftar Produk</div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>Foto</th>
                                        <th>Nama</th>
                                        <th>Kat</th>
                                        <th>Harga</th>
                                        <th>Aksi</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {% for p in products %}
                                    <tr>
                                        <td><img src="{{ p.image if p.image else 'https://via.placeholder.com/50' }}" width="50" height="50" style="object-fit: cover; border-radius: 5px;"></td>
                                        <td>{{ p.name }}</td>
                                        <td><span class="badge bg-secondary">{{ p.category }}</span></td>
                                        <td>{{ p.price }}</td>
                                        <td>
                                            <a href="/admin/product/edit/{{ p.id }}" class="btn btn-sm btn-warning">Edit</a>
                                            <a href="/admin/product/delete/{{ p.id }}" class="btn btn-sm btn-danger" onclick="return confirm('Hapus produk ini?')">Hapus</a>
                                        </td>
                                    </tr>
                                    {% endfor %}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
