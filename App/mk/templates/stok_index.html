{% extends 'base.html' %}
{% block title %}Kartu Stok{% endblock %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
    <h5 class="fw-bold mb-0"><i class="bi bi-box-seam me-2"></i>Kartu Stok</h5>
    <div class="d-flex gap-2">
        <a href="/mk/stok/masuk" class="btn btn-primary btn-sm"><i class="bi bi-box-arrow-in-right"></i> Stok Masuk</a>
        <a href="/mk/stok/opname" class="btn btn-outline-warning btn-sm"><i class="bi bi-clipboard-check"></i> Opname</a>
    </div>
</div>

<div class="card mb-3"><div class="card-body py-2">
<form method="GET" class="d-flex gap-2 align-items-center">
    <div class="position-relative flex-grow-1" style="max-width:350px">
        <i class="bi bi-search position-absolute" style="left:10px;top:50%;transform:translateY(-50%);color:#999;font-size:.85rem;"></i>
        <input type="text" name="search" class="form-control form-control-sm ps-4" placeholder="Cari obat..." value="{{ search }}" autocomplete="off">
        {% if search %}<a href="/mk/stok/" class="position-absolute text-decoration-none text-muted" style="right:8px;top:50%;transform:translateY(-50%);font-size:1.1rem;">&times;</a>{% endif %}
    </div>
    <button class="btn btn-sm btn-outline-primary"><i class="bi bi-search"></i></button>
</form></div></div>

<div class="row g-2">{% for o in obat_list %}
<div class="col-6 col-md-4 col-lg-3">
    <a href="/mk/stok/kartu/{{ o.id_obat }}" class="text-decoration-none">
    <div class="card h-100 border-0 shadow-sm"><div class="card-body py-2 px-3">
        <div class="fw-medium small text-dark">{{ o.nama_generik[:30] }}</div>
        <div class="d-flex justify-content-between align-items-center mt-1">
            <small class="text-muted">Stok</small>
            <span class="fw-bold fs-5 {% if o.stok_total <= o.stok_minimum %}text-danger{% else %}text-success{% endif %}">{{ o.stok_total }}</span>
        </div>
        <small class="text-muted">Min: {{ o.stok_minimum }}</small>
    </div></div></a>
</div>{% endfor %}</div>
{% endblock %}
