{% extends 'base.html' %}
{% block title %}{{ 'Edit' if user else 'Tambah' }} User{% endblock %}
{% block content %}
<h5 class="fw-bold mb-3"><i class="bi bi-shield-lock me-2"></i>{{ 'Edit' if user else 'Tambah' }} User</h5>
<div class="card"><div class="card-body">
<form method="POST">
<div class="row g-3">
    <div class="col-md-4"><label class="form-label">Nama <span class="text-danger">*</span></label>
        <input type="text" name="nama" class="form-control form-control-sm" required value="{{ user.nama if user else '' }}"></div>
    <div class="col-md-3"><label class="form-label">Username <span class="text-danger">*</span></label>
        <input type="text" name="username" class="form-control form-control-sm" required value="{{ user.username if user else '' }}"></div>
    <div class="col-md-2"><label class="form-label">Role</label>
        <select name="role" class="form-select form-select-sm select-search">
            {% for r in ['kasir','ttk','gudang','apoteker','manajer','super_admin'] %}
            <option value="{{ r }}" {{ 'selected' if user and user.role==r }}>{{ r.replace('_',' ') }}</option>{% endfor %}
        </select></div>
    <div class="col-md-3"><label class="form-label">Password {{ '(kosongkan jika tidak diubah)' if user else '' }}</label>
        <input type="password" name="password" class="form-control form-control-sm" {{ 'required' if not user }}></div>
    <div class="col-md-4"><label class="form-label">No. SIPA</label>
        <input type="text" name="no_sipa" class="form-control form-control-sm" value="{{ user.no_sipa if user else '' }}"></div>
    {% if user %}<div class="col-md-2 d-flex align-items-end"><div class="form-check">
        <input type="checkbox" name="is_active" class="form-check-input" id="is_active" {{ 'checked' if user.is_active }}>
        <label class="form-check-label" for="is_active">Aktif</label></div></div>{% endif %}
</div>
<div class="mt-3"><button class="btn btn-primary btn-sm"><i class="bi bi-save"></i> Simpan</button>
    <a href="/mk/master/user" class="btn btn-secondary btn-sm">Batal</a></div>
</form>
</div></div>
{% endblock %}
