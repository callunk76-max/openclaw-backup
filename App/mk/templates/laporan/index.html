{% extends "base.html" %}
{% block title %}Laporan{% endblock %}
{% block content %}
<h1 class="text-xl font-bold mb-4"><i class="fas fa-chart-bar text-blue-600"></i> Laporan</h1>
<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
    <a href="{{BASE}}/laporan/lplpo" class="card p-6 hover:border-green-500 border-2 border-transparent">
        <i class="fas fa-file-excel text-3xl text-green-600 mb-2"></i>
        <h3 class="font-semibold">LPLPO</h3>
        <p class="text-sm text-gray-500">Laporan Pemakaian & Lembar Permintaan Obat</p>
    </a>
    <a href="{{BASE}}/laporan/resep-harian" class="card p-6 hover:border-blue-500 border-2 border-transparent">
        <i class="fas fa-prescription text-3xl text-blue-600 mb-2"></i>
        <h3 class="font-semibold">Resep Harian</h3>
        <p class="text-sm text-gray-500">Rekapitulasi resep per hari</p>
    </a>
    <a href="{{BASE}}/stok" class="card p-6 hover:border-orange-500 border-2 border-transparent">
        <i class="fas fa-boxes text-3xl text-orange-600 mb-2"></i>
        <h3 class="font-semibold">Stok Akhir</h3>
        <p class="text-sm text-gray-500">Kondisi stok terkini & stok kritis</p>
    </a>
</div>
{% endblock %}
