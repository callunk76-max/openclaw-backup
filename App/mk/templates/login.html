<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apotik Aramedica - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #0f172a, #1e293b); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: rgba(255,255,255,.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,.1); border-radius: 20px; padding: 40px; width: 100%; max-width: 380px; }
        .login-card h1 { color: #fff; font-size: 1.4rem; font-weight: 800; text-align: center; }
        .login-card p { color: #94a3b8; text-align: center; font-size: .85rem; }
        .login-card input { background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.15); color: #fff; padding: 12px 16px; border-radius: 12px; width: 100%; }
        .login-card input:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,.3); }
        .login-card input::placeholder { color: #64748b; }
        .login-card button { background: linear-gradient(135deg, #6366f1, #4f46e5); border: none; padding: 12px; border-radius: 12px; color: #fff; font-weight: 700; width: 100%; cursor: pointer; }
        .login-card button:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(99,102,241,.4); }
        .error-msg { color: #f87171; text-align: center; margin-top: 10px; font-size: .85rem; }
    </style>
</head>
<body>
    <div class="login-card">
        <div style="text-align:center;font-size:3rem;margin-bottom:10px;">💊</div>
        <h1>Apotik Aramedica</h1>
        <p>Masuk untuk melanjutkan</p>
        <form method="POST">
            <input type="text" name="username" placeholder="Username" required autofocus class="mb-3">
            <input type="password" name="password" placeholder="Password" required>
            {% with msgs = get_flashed_messages() %}
            {% if msgs %}<div class="error-msg">{{ msgs[0] }}</div>{% endif %}
            {% endwith %}
            <button type="submit" class="mt-4">Masuk</button>
        </form>
        <p class="mt-3" style="font-size:.7rem;color:#475569;text-align:center;">Apotik Aramedica v1.0</p>
    </div>
</body>
</html>
