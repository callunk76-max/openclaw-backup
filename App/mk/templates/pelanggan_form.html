{% extends 'base.html' %}
{% block title %}{{ 'Edit' if pelanggan else 'Tambah' }} Pelanggan{% endblock %}
{% block content %}
<h5 class="fw-bold mb-3"><i class="bi bi-people me-2"></i>{{ 'Edit' if pelanggan else 'Tambah' }} Pelanggan</h5>
<div class="card"><div class="card-body">
<form method="POST">
<div class="row g-3">
    <div class="col-md-4"><label class="form-label">Nama <span class="text-danger">*</span></label>
        <input type="text" name="nama" class="form-control form-control-sm" required value="{{ pelanggan.nama if pelanggan else '' }}"></div>
    <div class="col-md-3"><label class="form-label">Telepon</label>
        <input type="text" name="telepon" class="form-control form-control-sm" value="{{ pelanggan.telepon if pelanggan else '' }}"></div>
    <div class="col-md-3"><label class="form-label">Tanggal Lahir</label>
        <input type="date" name="tanggal_lahir" class="form-control form-control-sm" value="{{ pelanggan.tanggal_lahir if pelanggan else '' }}"></div>
    <div class="col-12"><label class="form-label">Alamat</label>
        <textarea name="alamat" class="form-control form-control-sm" rows="2">{{ pelanggan.alamat if pelanggan else '' }}</textarea></div>
</div>
<div class="mt-3"><button class="btn btn-primary btn-sm"><i class="bi bi-save"></i> Simpan</button>
    <a href="/mk/master/pelanggan" class="btn btn-secondary btn-sm">Batal</a></div>
</form>
</div></div>
{% endblock %}
