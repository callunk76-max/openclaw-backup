<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📊 Breakout Scanner Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding:16px;min-height:100vh;transition:background .3s,color .3s;}
.container{max-width:1500px;margin:0 auto;}
[data-theme="dark"]{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#c9d1d9;--dim:#8b949e;--green:#3fb950;--red:#f85149;--gold:#d29922;--bg-hover:rgba(255,255,255,0.05);}
[data-theme="light"]{--bg:#fff;--card:#f6f8fa;--border:#d0d7de;--text:#1f2328;--dim:#656d76;--green:#1a7f37;--red:#cf222e;--gold:#9a6700;--bg-hover:rgba(0,0,0,0.03);}
body{background:var(--bg);color:var(--text);}
.theme-btn{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:.85rem;}
.header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.header h1{font-size:clamp(1.1rem,3vw,1.6rem);font-weight:700;}
.header .meta{font-size:.8rem;color:var(--dim);text-align:right;}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);}
.glow-green{box-shadow:0 0 12px rgba(63,185,80,0.3);}
.glow-gold{box-shadow:0 0 12px rgba(210,153,34,0.3);}
.stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 16px;flex:1;min-width:90px;text-align:center;cursor:pointer;transition:all .2s;user-select:none;}
.stat-card:hover{transform:translateY(-2px);border-color:var(--dim);}
.stat-card .num{font-size:1.4rem;font-weight:700;}
.stat-card .label{font-size:.7rem;color:var(--dim);margin-top:2px;}
.gold-section{background:linear-gradient(135deg,rgba(210,153,34,0.08),rgba(210,153,34,0.02));border:1px solid rgba(210,153,34,0.3);border-radius:8px;padding:12px 16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;cursor:pointer;transition:all .2s;}
.gold-section:hover{border-color:var(--gold);transform:translateY(-1px);}
.gold-section .left{display:flex;align-items:center;gap:12px;}
.gold-section .price-big{font-size:1.4rem;font-weight:700;}
.gold-section .label-sm{font-size:.75rem;color:var(--dim);}
.pairs-wrapper{overflow-x:auto;overflow-y:hidden;border:1px solid var(--border);border-radius:8px;margin-bottom:20px;}
.pairs-wrapper::-webkit-scrollbar{height:4px;}
.pairs-wrapper::-webkit-scrollbar-track{background:var(--bg);}
.pairs-wrapper::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.scroll-hint{text-align:center;font-size:.6rem;color:var(--dim);margin-top:-16px;margin-bottom:16px;display:none;}
@media(max-width:900px){.scroll-hint{display:block;}}
table{width:100%;border-collapse:collapse;font-size:.82rem;}
th{background:var(--card);padding:10px 8px;text-align:left;border-bottom:2px solid var(--border);white-space:nowrap;font-size:.72rem;text-transform:uppercase;letter-spacing:.5px;color:var(--dim);position:sticky;top:0;z-index:2;}
td{padding:8px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr{cursor:pointer;transition:background .15s;}
tr:hover{background:var(--bg-hover)!important;}
tr.breakout{background:rgba(63,185,80,0.06)!important;border-left:3px solid var(--green);}
tr.breakout:hover{background:rgba(63,185,80,0.1)!important;}
.pair-name{font-weight:600;white-space:nowrap;}
.pair-name.gold{color:var(--gold);}
.dir-up{color:var(--green);}
.dir-down{color:var(--red);}
.price{font-family:'SF Mono','Fira Code',monospace;font-size:.82rem;}
.vol-bar-wrapper,.body-bar-wrapper{display:flex;align-items:center;gap:6px;}
.vol-bar,.body-bar{height:6px;border-radius:3px;background:var(--border);flex:1;min-width:40px;}
.vol-bar-fill,.body-bar-fill{height:100%;border-radius:3px;transition:width .3s;}
.vol-bar-fill.pass,.body-bar-fill.pass{background:var(--green);}
.vol-bar-fill.fail,.body-bar-fill.fail{background:var(--red);}
.filter-badge{display:inline-flex;padding:2px 6px;border-radius:4px;font-size:.65rem;font-weight:600;}
.filter-badge.on{background:rgba(63,185,80,0.15);color:var(--green);}
.filter-badge.off{background:rgba(248,81,73,0.15);color:var(--red);}
.rec-section{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-bottom:16px;}
.rec-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:.85rem;font-weight:600;}
.rec-badge{background:rgba(63,185,80,0.2);color:var(--green);padding:2px 10px;border-radius:12px;font-size:.72rem;font-weight:600;}
.rec-item{display:flex;align-items:center;gap:6px;padding:6px 8px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;border-radius:4px;flex-wrap:wrap;}
.rec-item:last-child{border-bottom:none;}
.rec-item:hover{background:var(--bg-hover);}
.rec-empty{text-align:center;color:var(--dim);padding:20px;font-size:.8rem;}
.rec-reason{background:rgba(255,255,255,0.06);padding:2px 8px;border-radius:4px;font-size:.65rem;}
.modal-xl{max-width:95vw!important;}
.modal-dialog{margin:.5rem auto;}
.chart-wrap{position:relative;width:100%;height:65vh;min-height:450px;border-radius:6px;overflow:hidden;}
.chart-wrap.fullscreen{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:99999;border-radius:0;background:var(--bg);}
.chart-wrap.fullscreen .chart-container{height:100vh;}
.chart-container{width:100%;height:100%;}
.fs-btn{position:absolute;top:10px;right:10px;z-index:50;background:rgba(0,0,0,0.65);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 12px;cursor:pointer;font-size:.85rem;}
.chart-tabs{display:flex;gap:4px;margin-bottom:8px;}
.chart-tab{padding:6px 14px;border-radius:6px;background:var(--card);border:1px solid var(--border);color:var(--dim);cursor:pointer;font-size:.8rem;transition:all .15s;}
.chart-tab.active{background:rgba(88,166,255,0.15);border-color:#58a6ff;color:#58a6ff;}
.modal-content{background:var(--bg);border:1px solid var(--border);color:var(--text);}
.modal-header{border-bottom:1px solid var(--border);padding:10px 16px;}
.modal-header .btn-close{filter:invert(0.8);}
.pair-detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:6px;margin:8px 0;}
.detail-item{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:6px 10px;text-align:center;}
.detail-item .val{font-size:1rem;font-weight:600;}
.detail-item .lbl{font-size:.65rem;color:var(--dim);}
@media(max-width:900px){
  .chart-wrap{height:50vh;min-height:300px;}
}
@media(max-width:600px){
  body{padding:8px;}
  th,td{padding:5px 3px;font-size:.65rem;}
  .stat-card{min-width:60px;padding:6px 8px;}
  .stat-card .num{font-size:1rem;}
  .vol-bar,.body-bar{min-width:20px;}
  .vol-bar-wrapper,.body-bar-wrapper{gap:4px;}
  .gold-section .price-big{font-size:1.1rem;}
  .modal-xl{max-width:100vw!important;margin:0;}
  .chart-wrap{height:40vh;min-height:250px;}
}
@media(max-width:400px){
  th,td{padding:3px 2px;font-size:.6rem;}
  .vol-bar-wrapper,.body-bar-wrapper{gap:2px;}
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📊 Breakout Scanner <span style="color:var(--dim);font-size:.8rem">H1</span></h1>
    <div class="meta" style="display:flex;align-items:center;gap:8px">
      <button class="theme-btn" id="themeToggle" onclick="toggleTheme()">🌙</button>
      <div><span class="status-dot" id="statusDot"></span> <span id="updateTime">Loading...</span></div>
    </div>
  </div>

  <div class="gold-section" id="goldSection" onclick="openChart('XAU/USD')">
    <div class="left"><span style="font-size:1.5rem">🥇</span>
      <div><div class="price-big" id="goldPrice">—</div><div class="label-sm">XAUUSD</div></div></div>
    <div><div id="goldDirection" style="font-size:.9rem">—</div><div id="goldBody" class="label-sm">Body: —</div><div id="goldFilters" style="margin-top:4px;font-size:.7rem"></div></div>
  </div>

  <div class="stats">
    <div class="stat-card" id="statTotal"><div class="num">0</div><div class="label">Total</div></div>
    <div class="stat-card glow-green" id="statBreakout" onclick="filterTable('breakout')"><div class="num" style="color:var(--green)">0</div><div class="label">🚨 Breakout</div></div>
    <div class="stat-card" id="statBullish" onclick="filterTable('bullish')"><div class="num" style="color:var(--green)">0</div><div class="label">🟢 Bullish</div></div>
    <div class="stat-card" id="statBearish" onclick="filterTable('bearish')"><div class="num" style="color:var(--red)">0</div><div class="label">🔴 Bearish</div></div>
    <div class="stat-card" id="statAll" onclick="filterTable('all')"><div class="num">29</div><div class="label">📋 Semua</div></div>
  </div>

  <div class="rec-section" id="recSection">
    <div class="rec-header">📊 Rekomendasi <span class="rec-badge" id="recCount">0</span></div>
    <div id="recList"></div>
  </div>

  <div class="pairs-wrapper">
    <table><thead><tr>
      <th>#</th><th>Pair</th><th>Dir</th><th>Volume</th><th>Body</th><th>Filters</th><th>H-1</th>
    </tr></thead><tbody id="pairsBody">
      <tr><td colspan="8" style="text-align:center;padding:40px;color:var(--dim)">Loading data...</td></tr>
    </tbody></table>
  </div>
  <div class="scroll-hint">← Geser ke samping →</div>
</div>

<div class="modal fade" id="chartModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-xl modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header"><span style="font-size:1.2rem;font-weight:600" id="modalTitle"></span><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body" style="padding:10px">
        <div class="pair-detail-grid" id="pairDetails"></div>
        <div class="chart-tabs">
          <div class="chart-tab active" data-tf="60" onclick="switchTF(this,'60')">H1</div>
          <div class="chart-tab" data-tf="240" onclick="switchTF(this,'240')">H4</div>
          <div class="chart-tab" data-tf="1D" onclick="switchTF(this,'1D')">D1</div>
        </div>
        <div class="chart-wrap" id="chartWrap"><div class="chart-container" id="chartContainer"></div><div class="fs-btn" onclick="toggleFullscreen()">⛶ Fullscreen</div></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" defer></script>
<script src="https://s3.tradingview.com/tv.js" async onload="window.__TV=1"></script>
<script>
const DATA_URL='/trading/data.json', REFRESH_MS=30000;
let pairsCache=[], activeTVWidget=null, currentSymbol=null, currentTF='60', modalInstance=null, currentFilter='all';

function toggleTheme(){
  const cur=document.documentElement.getAttribute('data-theme')||'dark', next=(cur==='dark'?'light':'dark');
  document.documentElement.setAttribute('data-theme',next);
  document.getElementById('themeToggle').textContent=next==='dark'?'🌙':'☀️';
  localStorage.setItem('theme',next);
  try{if(activeTVWidget&&typeof TradingView!=='undefined')activeTVWidget.resize();}catch(e){}
}
(function(){const t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);if(t==='light')document.getElementById('themeToggle').textContent='☀️';})();

function tvSymbol(p){return p==='XAU/USD'?'TVC:GOLD':'OANDA:'+p.replace('/','');}
function scorePair(p){const ok=[p.filters.volume,p.filters.body,p.filters.close].filter(Boolean).length;return ok*10000+(p.vol_ratio||0)*100+(p.body_pct||0);}
function pairColor(d){return d==='BULLISH'?'var(--green)':'var(--red)';}
function dirIcon(d){return d==='BULLISH'?'🟢':'🔴';}
function fmt$(v,d){return (v||0).toLocaleString(undefined,{minimumFractionDigits:d||2,maximumFractionDigits:d||2});}
function fmt5(v){return (v||0).toLocaleString(undefined,{minimumFractionDigits:5,maximumFractionDigits:5});}

async function loadData(){
  try{
    const r=await fetch(DATA_URL+'?_='+Date.now());
    const data=await r.json();
    pairsCache=(data.pairs||[]).sort((a,b)=>scorePair(b)-scorePair(a));
    render(data);
  }catch(e){
    document.getElementById('pairsBody').innerHTML='<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--red)">❌ '+e.message+'</td></tr>';
  }
}

function render(data){
  try{renderCore(data);}catch(e){console.error(e);document.getElementById('updateTime').textContent='⚠️ '+e.message;try{applyFilter();}catch(e2){}}
}

function renderCore(data){
  document.getElementById('updateTime').textContent=data.updated||'—';
  const gold=pairsCache.find(p=>p.pair==='XAU/USD');
  if(gold){
    document.getElementById('goldPrice').textContent='$'+fmt$(gold.price,2);
    document.getElementById('goldDirection').innerHTML=gold.direction==='BULLISH'?'🟢 BULLISH':'🔴 BEARISH';
    document.getElementById('goldBody').textContent='Body: '+gold.body_pct+'% | Vol: '+((gold.vol_ratio||1).toFixed(1))+'x';
    // Gold VBC filters
    const gf=document.getElementById('goldFilters');
    if(gf){
      const v=gold.filters?'<span class="filter-badge '+(gold.filters.volume?'on':'off')+'">V</span>':'';
      const b=gold.filters?'<span class="filter-badge '+(gold.filters.body?'on':'off')+'">B</span>':'';
      const c=gold.filters?'<span class="filter-badge '+(gold.filters.close?'on':'off')+'">C</span>':'';
      gf.innerHTML=v+' '+b+' '+c;
    }
  }
  renderRecs(data.recommendations);
  const bo=pairsCache.filter(p=>p.pass), bu=pairsCache.filter(p=>p.direction==='BULLISH');
  const be=pairsCache.filter(p=>p.direction==='BEARISH');
  document.querySelector('#statTotal .num').textContent=pairsCache.length;
  document.querySelector('#statBreakout .num').textContent=bo.length;
  document.querySelector('#statBullish .num').textContent=bu.length;
  document.querySelector('#statBearish .num').textContent=be.length;
  applyFilter();
}

function applyFilter(){
  let filtered=pairsCache;
  if(currentFilter==='breakout') filtered=pairsCache.filter(p=>p.pass);
  else if(currentFilter==='bullish') filtered=pairsCache.filter(p=>p.direction==='BULLISH');
  else if(currentFilter==='bearish') filtered=pairsCache.filter(p=>p.direction==='BEARISH');
  document.querySelectorAll('.stat-card').forEach(c=>c.classList.remove('clicked'));
  const el=document.getElementById('stat'+currentFilter.charAt(0).toUpperCase()+currentFilter.slice(1));
  if(el)el.classList.add('clicked');
  let html='', rank=0;
  for(const p of filtered){
    rank++; const bo=p.pass, isG=p.pair==='XAU/USD', di=dirIcon(p.direction), dc=p.direction==='BULLISH'?'dir-up':'dir-down';
    const vp=Math.min((p.vol_ratio||0)/3*100,100), bp=Math.min(p.body_pct||0,100);
        let st='<span style="font-size:.55rem;color:var(--dim)">n/a</span>';
    if(p.prev_h1_dir){const pe=p.prev_h1_dir==='BULLISH'?'🟢':'🔴';const pl=p.prev_h1_dir==='BULLISH'?'Bull':'Bear';st='<span style="font-size:.6rem">'+pe+' '+pl+'</span>';}
    if(p.prev_h1_dir){const h1e=p.prev_h1_dir==='BULLISH'?'🟢':'🔴';const h1l=p.prev_h1_dir==='BULLISH'?'Bull':'Bear';h1html='<span style="font-size:.6rem">'+h1e+' '+h1l+'</span>';}
    html+='<tr class="'+(bo?'breakout':'')+'" onclick="openChart(\''+p.pair+'\')">';
    html+='<td style="color:var(--dim);font-size:.75rem">'+rank+'</td>';
    html+='<td class="pair-name '+(isG?'gold':'')+'">'+(isG?'🥇 ':'')+p.pair+'</td>';
    html+='<td class="'+dc+'">'+di+'</td>';
    html+='<td><div class="vol-bar-wrapper"><div class="vol-bar"><div class="vol-bar-fill '+(p.filters.volume?'pass':'fail')+'" style="width:'+vp+'%"></div></div><span style="font-size:.7rem">'+((p.vol_ratio||0).toFixed(1))+'x</span></div></td>';
    html+='<td><div class="body-bar-wrapper"><div class="body-bar"><div class="body-bar-fill '+(p.filters.body?'pass':'fail')+'" style="width:'+bp+'%"></div></div><span style="font-size:.7rem">'+p.body_pct+'%</span></div></td>';
    html+='<td><span class="filter-badge '+(p.filters.volume?'on':'off')+'">V</span> <span class="filter-badge '+(p.filters.body?'on':'off')+'">B</span> <span class="filter-badge '+(p.filters.close?'on':'off')+'">C</span></td>';
    html+='<td>'+st+'</td></tr>';
  }
  if(!filtered.length) html='<tr><td colspan="8" style="text-align:center;padding:30px;color:var(--dim)">Tidak ada pair</td></tr>';
  document.getElementById('pairsBody').innerHTML=html;
}

function filterTable(t){currentFilter=t;applyFilter();}

function renderRecs(recs){
  try{
    const container=document.getElementById('recList'), count=document.getElementById('recCount');
    if(!container||!count)return;
    let html='';
    if(!recs||!recs.length){
      html+='<div class="rec-empty">Belum ada breakout — tunggu H1 selesai</div>';
    }else{
      count.textContent=recs.length;
      for(let i=0;i<Math.min(recs.length,15);i++){
        const r=recs[i], di=dirIcon(r.direction), isG=r.pair==='XAU/USD', pd=isG?'🥇 XAUUSD':r.pair;
        const reasons=(r.reasons||[]).map(rs=>'<span class="rec-reason">'+rs+'</span>').join('');
        const isAman=(r.reasons||[]).some(rs=>rs.indexOf('✅ AMAN')>=0);
        const badge=isAman?'<span style="font-size:.7rem;font-weight:700;color:var(--green)">✅ AMAN</span>':'<span style="font-size:.7rem;font-weight:700;color:var(--red)">⚠️</span>';
        html+='<div class="rec-item" onclick="openChart(\''+r.pair+'\')">';
        html+='<span style="font-size:.85rem;min-width:22px">'+(i<3?['🥇','🥈','🥉'][i]:(i+1)+'️⃣')+'</span>';
        html+='<span class="pair-name '+(isG?'gold':'')+'">'+pd+'</span>';
        html+='<span style="color:'+pairColor(r.direction)+';font-size:.72rem">'+di+' '+r.direction+'</span>';
        html+=badge;
        html+='<span style="display:flex;flex-wrap:wrap;gap:3px;flex:1;min-width:100px">'+reasons+'</span></div>';
      }
    }
    container.innerHTML=html;
  }catch(e){console.error('recs error:',e);}
}

function openChart(pair){try{const p=pairsCache.find(x=>x.pair===pair);if(p)openChartCore(p,pair);}catch(e){}}
function openChartCore(p,pair){
  currentSymbol=pair;currentTF='60';const isG=pair==='XAU/USD';
  const w=document.getElementById('chartWrap');
  if(w&&w.classList.contains('fullscreen')){w.classList.remove('fullscreen');const b=w.querySelector('.fs-btn');if(b)b.textContent='⛶ Fullscreen';}
  document.getElementById('modalTitle').textContent=(isG?'🥇 ':'')+pair+' ('+tvSymbol(pair)+')';
  document.getElementById('pairDetails').innerHTML=
    '<div class="detail-item"><div class="val" style="color:'+pairColor(p.direction)+'">'+dirIcon(p.direction)+' '+p.direction+'</div><div class="lbl">Dir</div></div>'+
    '<div class="detail-item"><div class="val">$'+fmt$(p.price)+'</div><div class="lbl">Price</div></div>'+
    '<div class="detail-item"><div class="val">'+p.body_pct+'%</div><div class="lbl">Body '+(p.filters.body?'🟢':'🔴')+'</div></div>'+
    '<div class="detail-item"><div class="val">'+((p.vol_ratio||0).toFixed(2))+'x</div><div class="lbl">Vol '+(p.filters.volume?'🟢':'🔴')+'</div></div>'+
    '<div class="detail-item"><div class="val">'+fmt$(p.high,isG?2:5)+'</div><div class="lbl">High</div></div>'+
    '<div class="detail-item"><div class="val">'+fmt$(p.low,isG?2:5)+'</div><div class="lbl">Low '+(p.filters.close?'🟢':'🔴')+'</div></div>';
  document.querySelectorAll('.chart-tab').forEach(t=>t.classList.remove('active'));
  document.querySelector('.chart-tab[data-tf="60"]').classList.add('active');
  if(!modalInstance) modalInstance=new bootstrap.Modal(document.getElementById('chartModal'));
  modalInstance.show();setTimeout(()=>loadChart(pair,'60'),300);
}

function loadChart(pair,tf){
  try{if(activeTVWidget){activeTVWidget.remove();activeTVWidget=null;}}catch(e){}
  document.getElementById('chartContainer').innerHTML='<div style="padding:40px;text-align:center;color:var(--dim)">Memuat chart...</div>';
  if(typeof TradingView==='undefined'||!TradingView.widget){
    document.getElementById('chartContainer').innerHTML='<div style="padding:40px;text-align:center;color:var(--red)">⚠️ TV blm siap. Klik ulang.</div>';return;}
  activeTVWidget=new TradingView.widget({
    container_id:'chartContainer',width:'100%',height:'100%',
    symbol:tvSymbol(pair),interval:tf,timezone:'Asia/Jakarta',
    theme:document.documentElement.getAttribute('data-theme')==='light'?'Light':'dark',
    style:'1',locale:'id',enable_publishing:false,hide_top_toolbar:true,save_image:true,
    backgroundColor:getComputedStyle(document.body).getPropertyValue('--card').trim()||'#0d1117',
    studies:['STD;EMA_9','STD;EMA_100','STD;EMA_200','STD;Volume'],
    studies_overrides:{'volume.volume.color.0':'#f85149','volume.volume.color.1':'#3fb950','volume.volume.transparency':70},
    autosize:true
  });
}

function switchTF(el,tf){if(tf===currentTF)return;document.querySelectorAll('.chart-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');currentTF=tf;if(currentSymbol)loadChart(currentSymbol,tf);}
function toggleFullscreen(){
  const w=document.getElementById('chartWrap');if(!w)return;
  const b=w.querySelector('.fs-btn'),f=w.classList.contains('fullscreen');
  const r=()=>{try{if(activeTVWidget)activeTVWidget.resize();}catch(e){}};
  if(f){w.classList.remove('fullscreen');if(b)b.innerHTML='⛶ Fullscreen';}else{w.classList.add('fullscreen');if(b)b.innerHTML='✕ Tutup';r();}
  setTimeout(r,100);
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    const w=document.getElementById('chartWrap');
    if(w&&w.classList.contains('fullscreen')){w.classList.remove('fullscreen');const b=w.querySelector('.fs-btn');if(b)b.textContent='⛶ Fullscreen';try{if(activeTVWidget)activeTVWidget.resize();}catch(e){}}
    else if(modalInstance)modalInstance.hide();
  }
});
loadData();setInterval(loadData,REFRESH_MS);
</script>
</body>
</html>
