<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard Kinerja - Pemkab Bulukumba{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --primary: #1e40af;
            --primary-light: #3b82f6;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: rgba(255,255,255,0.08);
            --success: #22c55e;
            --warning: #eab308;
            --danger: #ef4444;
        }
        body { 
            background: var(--bg-dark); 
            color: var(--text-primary) !important;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        /* Override Bootstrap dark text on dark bg */
        .text-secondary, .text-body-secondary, .text-muted {
            color: #94a3b8 !important;
        }
        .card, .card-body, .card-header, .card-footer {
            color: var(--text-primary);
        }
        .navbar {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 12px 0;
        }
        .navbar-brand { 
            font-weight: 800; 
            color: var(--text-primary) !important;
            font-size: 1.1rem;
        }
        .navbar-brand span { color: var(--primary-light); }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.3);
        }
        .card-header {
            background: transparent;
            border-bottom: 1px solid var(--border);
            padding: 16px 20px;
            font-weight: 700;
            font-size: 1rem;
        }
        .stat-card {
            padding: 20px;
            text-align: center;
            transition: transform 0.2s;
        }
        .stat-card:hover { transform: translateY(-2px); }
        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-label {
            color: #94a3b8;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }
        .table {
            color: #e2e8f0;
            margin: 0;
            font-size: 0.85rem;
        }
        .table th {
            background: rgba(255,255,255,0.06);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            color: #94a3b8;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            padding: 12px 16px;
        }
        .table td {
            background: transparent;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 10px 16px;
            vertical-align: middle;
            color: #f1f5f9;
        }
        .table-hover tbody tr:hover td {
            background: rgba(59, 130, 246, 0.08);
        }
        .badge-score {
            font-weight: 700;
            font-size: 0.8rem;
            padding: 4px 12px;
            border-radius: 20px;
        }
        .badge-excellent { background: rgba(34, 197, 94, 0.15); color: #22c55e; }
        .badge-good { background: rgba(59, 130, 246, 0.15); color: #3b82f6; }
        .badge-normal { background: rgba(234, 179, 8, 0.15); color: #eab308; }
        .badge-poor { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
        .search-box {
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            padding: 10px 16px 10px 40px;
            width: 100%;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .search-box:focus {
            outline: none;
            border-color: var(--primary-light);
            background: rgba(255,255,255,0.1);
        }
        .search-box::placeholder { color: #64748b; }
        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
        }
        .agency-link {
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }
        .agency-link:hover { color: var(--primary-light); }
        .breadcrumb {
            background: transparent;
            padding: 0;
            margin: 0;
        }
        .breadcrumb-item a { color: var(--primary-light); text-decoration: none; }
        .breadcrumb-item.active { color: #cbd5e1; }
        .breadcrumb-item+.breadcrumb-item::before { color: #64748b; }
        .breadcrumb-item+.breadcrumb-item::before { color: #475569; }
        .progress-bar-container {
            height: 6px;
            background: rgba(255,255,255,0.06);
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.6s ease;
        }
        @media (max-width: 768px) {
            .stat-number { font-size: 1.8rem; }
            .table { font-size: 0.75rem; }
        }
        @keyframes spin { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }
        .spinning { animation: spin 1s linear infinite; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a class="navbar-brand" href="/peg/">
                <i class="bi bi-bar-chart-fill me-2"></i>PEG<span>Dashboard</span>
            </a>
            <div class="d-flex align-items-center gap-3">
                <button class="btn btn-sm" onclick="document.getElementById('fileInput').click()" style="background:rgba(59,130,246,0.15);color:#93c5fd;border:1px solid rgba(59,130,246,0.25);font-weight:600;">
                    <i class="bi bi-upload me-1"></i> Upload
                </button>
                <input type="file" id="fileInput" accept=".zip,.xlsx,.xls,.pdf" style="display:none" multiple>
                <span id="uploadStatus" class="text-secondary" style="font-size:0.8rem;display:none;"></span>
            </div>
        </div>
    </nav>
    
    <div class="container py-4">
        {% block content %}{% endblock %}
    </div>

    <script>{% block upload_js %}
const fileInput = document.getElementById('fileInput');
const uploadStatus = document.getElementById('uploadStatus');

fileInput.addEventListener('change', async function() {
    const files = this.files;
    if (!files.length) return;
    
    uploadStatus.style.display = 'inline';
    uploadStatus.innerHTML = '<i class="bi bi-arrow-repeat me-1 spinning"></i> Memproses...';
    
    const formData = new FormData();
    for (const f of files) {
        formData.append('files[]', f);
    }
    
    try {
        const res = await fetch('/peg/upload', { method: 'POST', body: formData });
        const data = await res.json();
        
        if (data.ok) {
            uploadStatus.innerHTML = '<i class="bi bi-check-circle me-1" style="color:#22c55e;"></i> ' + data.message;
            uploadStatus.style.color = '#22c55e';
            setTimeout(() => { location.reload(); }, 1500);
        } else {
            uploadStatus.innerHTML = '<i class="bi bi-exclamation-circle me-1" style="color:#ef4444;"></i> ' + data.message;
            uploadStatus.style.color = '#ef4444';
        }
    } catch(e) {
        uploadStatus.innerHTML = '<i class="bi bi-exclamation-circle me-1" style="color:#ef4444;"></i> Gagal terhubung';
        uploadStatus.style.color = '#ef4444';
    }
    
    this.value = '';
    setTimeout(() => { uploadStatus.style.display = 'none'; }, 5000);
});
{% endblock %}</script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
